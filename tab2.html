<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Card and Table Layout</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #f0f2f5;
        font-family: "Inter", sans-serif;
        padding: 2rem;
      }
      .card-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 2rem;
      }
      .modern-card {
        border-radius: 1.5rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        max-width: 800px;
        width: 100%;
        position: relative;
        background-color: white;
        padding: 2rem;
      }
      .modern-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 20px -3px rgba(0, 0, 0, 0.15),
          0 6px 8px -2px rgba(0, 0, 0, 0.1);
      }
      .diagnosis-header {
        background-color: #2c3e50; /* Changed to a dark blue color */
        color: #ecf0f1; /* Light color for text */
        border-radius: 9999px; /* Make it a circle */
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
      }
      .table-responsive-wrapper {
        margin-top: 3rem;
      }
      .modern-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 1rem; /* Space between rows */
      }
      .modern-table th {
        padding: 0.75rem 1.5rem;
        text-align: left;
        font-weight: 600;
        color: #6b7280;
        border-bottom: 2px solid #e5e7eb;
      }
      .modern-table td {
        background-color: #f9fafb;
        padding: 1.5rem;
        border-radius: 0.75rem;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1),
          0 1px 2px 0 rgba(0, 0, 0, 0.06);
        color: #1f2937;
      }
      .modern-table tr:first-child td {
        border-top: none;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <!-- This card contains the table layout -->
    <div class="card-container">
      <div class="modern-card">
        <div class="diagnosis-header">Records</div>
        <div class="table-responsive-wrapper">
          <table class="modern-table">
            <thead>
              <tr>
                <th>Sequent</th>
                <th>Code</th>
                <th>Name</th>
              </tr>
            </thead>
            <tbody>
              <!-- Record 1 -->
              <tr>
                <td>1</td>
                <td>A00</td>
                <td>Cholera</td>
              </tr>
              <!-- Record 2 -->
              <tr>
                <td>2</td>
                <td>A01</td>
                <td>Typhoid fever</td>
              </tr>
              <!-- Record 3 -->
              <tr>
                <td>3</td>
                <td>A02</td>
                <td>Salmonella infection</td>
              </tr>
              <!-- Add more records as needed -->
              <tr>
                <td>4</td>
                <td>A03</td>
                <td>Shigellosis</td>
              </tr>
              <tr>
                <td>5</td>
                <td>A04</td>
                <td>Other bacterial food poisoning</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
