<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>Pure Drag & Drop Reorder (No libs)</title>
<style>
  body{font-family:Tahoma,Arial,sans-serif;margin:20px}
  table{width:100%;border-collapse:collapse}
  th,td{border:1px solid #ddd;padding:8px}
  tbody tr{background:#fff}
  td.handle{cursor:move;text-align:center;width:44px}
  td.handle::before{content:"≡";font-size:18px;opacity:.7}
  tr.dragging{opacity:.6}
  .btn{display:inline-block;padding:8px 14px;border:1px solid #ddd;border-radius:8px;background:#f7f7f7;cursor:pointer;margin:0 0 12px 0}
  .btn:hover{background:#eee}
  pre{background:#fafafa;border:1px solid #eee;padding:10px;border-radius:8px;white-space:pre-wrap}
</style>
</head>
<body>

<h2>ลากสลับแถว (ไม่ใช้ไลบรารี)</h2>
<p>ลากที่คอลัมน์ “ลาก” (≡) ได้เลย</p>
<button id="btnSave" class="btn">💾 แสดง payload (ส่งไป DB)</button>

<table id="tbl">
  <thead>
    <tr>
      <th style="width:60px">ลำดับ</th>
      <th style="width:60px">ลาก</th>
      <th>ID</th>
      <th>ชื่อ</th>
      <th>ตำแหน่ง</th>
    </tr>
  </thead>
  <tbody>
    <!-- mock data (เหมือนมาจาก DB) -->
    <tr data-id="101"><td class="idx">1</td><td class="handle"></td><td>101</td><td>สมชาย</td><td>ผู้จัดการ</td></tr>
    <tr data-id="102"><td class="idx">2</td><td class="handle"></td><td>102</td><td>สมหญิง</td><td>เจ้าหน้าที่</td></tr>
    <tr data-id="103"><td class="idx">3</td><td class="handle"></td><td>103</td><td>อนันต์</td><td>นักพัฒนา</td></tr>
    <tr data-id="104"><td class="idx">4</td><td class="handle"></td><td>104</td><td>วิภา</td><td>บัญชี</td></tr>
    <tr data-id="105"><td class="idx">5</td><td class="handle"></td><td>105</td><td>เดชา</td><td>คลังสินค้า</td></tr>
  </tbody>
</table>

<h3>Payload:</h3>
<pre id="out">[ยังไม่ได้กดปุ่ม]</pre>

<script>
(function(){
  const tbody = document.querySelector('#tbl tbody');
  let dragRow = null;

  // ทำให้ลากได้เฉพาะเวลาจิ้มที่เซลล์ handle
  tbody.addEventListener('pointerdown', (e) => {
    const handle = e.target.closest('td.handle');
    const tr = e.target.closest('tr');
    if (!handle || !tr) return;
    // เปิด drag บนแถวนี้ชั่วคราว
    tr.setAttribute('draggable', 'true');
  });

  // เก็บ reference ของแถวที่กำลังลาก
  tbody.addEventListener('dragstart', (e) => {
    const tr = e.target.closest('tr');
    if (!tr) return;
    dragRow = tr;
    tr.classList.add('dragging');
    // บาง browser ต้อง set data ถึงจะลากได้
    e.dataTransfer.setData('text/plain', tr.dataset.id || '');
    e.dataTransfer.effectAllowed = 'move';
  });

  // ปล่อยแถว: ล้างสถานะ
  tbody.addEventListener('dragend', (e) => {
    const tr = e.target.closest('tr');
    if (tr){
      tr.classList.remove('dragging');
      tr.removeAttribute('draggable'); // ปิด drag จนกว่าจะคลิก handle ใหม่
    }
    dragRow = null;
    renumber();
  });

  // ระหว่างลาก: ตำแหน่งแทรก
  tbody.addEventListener('dragover', (e) => {
    if (!dragRow) return;
    e.preventDefault(); // อนุญาตให้ drop
    const after = getRowAfterY(tbody, e.clientY);
    if (after == null) {
      tbody.appendChild(dragRow);
    } else if (after !== dragRow) {
      tbody.insertBefore(dragRow, after);
    }
  });

  // หาแถวถัดไปจากตำแหน่งเมาส์ (แบ่งครึ่งแถว)
  function getRowAfterY(container, y){
    const rows = [...container.querySelectorAll('tr:not(.dragging)')];
    for (const row of rows){
      const rect = row.getBoundingClientRect();
      const midpoint = rect.top + rect.height / 2;
      if (y < midpoint) return row;
    }
    return null;
  }

  // อัปเดตเลขลำดับคอลัมน์แรกเป็น 1..N
  function renumber(){
    [...tbody.rows].forEach((tr, i) => {
      const idxCell = tr.querySelector('.idx');
      if (idxCell) idxCell.textContent = i + 1;
    });
  }

  // ปุ่มแสดง payload สำหรับบันทึก DB
  document.getElementById('btnSave').addEventListener('click', () => {
    const payload = [...tbody.rows].map((tr, i) => ({
      id: Number(tr.dataset.id),
      sort_order: (i+1) * 10  // จะเก็บเป็น 1..N ก็เปลี่ยนเป็น i+1
    }));
    document.getElementById('out').textContent = JSON.stringify(payload, null, 2);
  });
})();
</script>
</body>
</html>
