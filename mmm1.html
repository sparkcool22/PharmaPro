<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>DataTables + SortableJS (Hard Sync, No Bounce Back)</title>

  <!-- DataTables v2 (ใช้เฉพาะ UI) -->
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>

  <!-- SortableJS สำหรับลาก DOM จริง -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <style>
    body{font-family:Tahoma,Arial,sans-serif;margin:20px}
    h2{margin:0 0 12px}
    table.dataTable td.handle{ cursor:move; text-align:center; width:42px }
    table.dataTable td.handle::before{ content:"≡"; font-size:18px; opacity:.8 }
    .btn{display:inline-block;padding:8px 14px;border:1px solid #ddd;border-radius:8px;background:#f7f7f7;cursor:pointer;margin:0 0 12px 0}
    .btn:hover{background:#eee}
    pre{background:#fafafa;border:1px solid #eee;padding:10px;border-radius:8px;white-space:pre-wrap}
  </style>
</head>
<body>

  
  <p>ปิด search/paging/ordering แล้ว ลากคอลัมน์ “ลาก” (≡) ได้เลย</p>
  <button id="btnSave" class="btn">💾 แสดง payload</button>

  <table id="myTable" class="display" style="width:100%">
    <thead>
      <tr>
        <th>ลำดับ</th>
        <th>ลาก</th>
        <th>ID</th>
        <th>ชื่อ</th>
        <th>ตำแหน่ง</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <!-- mock data -->
      <tr data-id="101"><td class="idx">1</td><td class="handle"></td><td>101</td><td>สมชาย</td><td>ผู้จัดการ</td></tr>
      <tr data-id="102"><td class="idx">2</td><td class="handle"></td><td>102</td><td>สมหญิง</td><td>เจ้าหน้าที่</td></tr>
      <tr data-id="103"><td class="idx">3</td><td class="handle"></td><td>103</td><td>อนันต์</td><td>นักพัฒนา</td></tr>
      <tr data-id="104"><td class="idx">4</td><td class="handle"></td><td>104</td><td>วิภา</td><td>บัญชี</td></tr>
      <tr data-id="105"><td class="idx">5</td><td class="handle"></td><td>105</td><td>เดชา</td><td>คลังสินค้า</td></tr>
    </tbody>
  </table>

  <h3>Payload:</h3>
  <pre id="out">[ยังไม่ได้กดปุ่ม]</pre>

<script>
$(function(){
  // 1) เปิด DataTables โดยปิดทุกฟีเจอร์ที่ทำให้ DOM ขยับเอง
  const dt = $('#myTable').DataTable({
    searching: false,
    paging: false,
    info: false,
    ordering: false,   // สำคัญ: กัน DT ไปจัดเรียงเอง
    autoWidth: false
  });

  const tbody = document.getElementById('tbody');

  // helper: อัปเดตเลขลำดับคอลัมน์แรก 1..N
  function renumber(){
    [...tbody.rows].forEach((tr, i) => tr.querySelector('.idx').textContent = i + 1);
  }

  // 2) ผูก SortableJS กับ <tbody>
  new Sortable(tbody, {
    handle: '.handle',
    animation: 150,
    onSort: function () {
      // หลังลาก: 1) รีนัมเบอร์ DOM
      renumber();

      // 2) Hard Sync ให้ DataTables ตาม DOM ปัจจุบัน 100%
      //    - ดึงแถว DOM ตามลำดับใหม่
      const newOrderNodes = [...tbody.rows];     // array ของ <tr> ที่เรียงใหม่
      //    - ล้างข้อมูล DT แล้วใส่ node กลับ (DT รองรับการ add ด้วย node)
      dt.clear();
      dt.rows.add(newOrderNodes).draw(false);
      // 3) ย้ำอีกครั้ง: รีนัมเบอร์หลัง draw (กัน side effect)
      renumber();
    }
  });

  // 3) ปุ่มโชว์ payload (พร้อมส่งไป DB)
  $('#btnSave').on('click', function(){
    const payload = [...tbody.rows].map((tr, i) => ({
      id: Number(tr.dataset.id),
      sort_order: (i+1) * 10
    }));
    $('#out').text(JSON.stringify(payload, null, 2));
  });
});
</script>
</body>
</html>
